version: "3.8"

services:
  app:
    image: rushi5706/mlops-pipeline:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlops-app
    volumes:
      - app-data:/app
    working_dir: /app
    healthcheck:
      test: ["CMD", "python", "-c", "import sklearn; import dvc; import pandas; print('healthy')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    command: ["tail", "-f", "/dev/null"]

volumes:
  app-data:
    driver: local
